<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reportes Power BI</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(135deg,#f5f7fa,#e4e8f0);
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    padding:25px;
}

.navbar{
    background:#E51C22;
    border-radius:18px;
    padding:18px 25px;
    margin-bottom:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.navbar-title{
    color:white;
    font-size:28px;
    font-weight:700;
}

.logo{
    height:55px;
    width:auto;
    object-fit:contain;
}

.dashboard-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(50px,1fr));
    gap:18px;
    margin-bottom:25px;
}

.card-btn{
    position:relative;
    padding:px;
    border-radius:20px;
    background:rgba(255,255,255,.9);
    backdrop-filter:blur(10px);
    border-left:6px solid #E51C22;
    cursor:pointer;
    text-align:center;
    transition:.35s;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.card-btn:hover{
    transform:translateY(-8px);
    background:#E51C22;
    color:white;
    box-shadow:0 20px 40px rgba(229,28,34,.25);
}

.card-btn:hover p{
    color:white;
}

.card-btn i{
    font-size:5px;
    display:block;
    margin-bottom:5px;
}

.card-btn h3{
    margin-bottom:5px;
}

.card-btn p{
    color:#6b7280;
}

.report-card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 10px 10px rgba(0,0,0,.12);
}

.report-header{
    background:linear-gradient(135deg,#ff4d4d,#d90429);
    color:white;
    padding:5px;
    text-align:center;
    font-size:22px;
    font-weight:700;
}

#placeholder{
    height:850px;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(135deg,#f8fafc,#eef2f7);
}

.placeholder-title{
    font-size:36px;
    font-weight:800;
    color:#dc3545;
}

.placeholder-text{
    margin-top:10px;
    color:#6b7280;
    font-size:18px;
}

iframe{
    width:100%;
    height:850px;
    border:none;
    display:none;
}

.arrow{
    font-size:42px;
    display:inline-block;
    animation:bounce 1.2s infinite;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

</style>

</head>

<body>

<div class="navbar">

```
<div class="navbar-title">
    Reportes Grupo Carsa
</div>

<img
    src="https://drive.google.com/uc?export=view&id=1VwTev2ZqTlRqhTeImYsYZ4TDGGWgbTGG"
    class="logo"
    alt="Logo">
```

</div>

<div class="dashboard-grid">

```
<div class="card-btn"
     onclick="cargarReporte('Venta QT','https://app.powerbi.com/view?r=eyJrIjoiZDEwZWI3NjgtMTE0Mi00NmNmLWI3NTctMmUzY2Y0NzVmZTQ4IiwidCI6IjAyMDhhY2YzLTJiYjQtNGMzYi04MGQ5LTM2YTY4M2Y3OWZkNiJ9&pageName=2b13e294406015565300')">

    <i class="bi bi-graph-up-arrow"></i>
    <h3>Venta QT</h3>
    <p>Indicadores comerciales</p>

</div>

<div class="card-btn"
     onclick="cargarReporte('Liquidación Antigüedad','https://app.powerbi.com/view?r=eyJrIjoiZGU5NWZkMWItMzQyZC00MWYxLWI4MmEtY2VkODFkNTUxMzU1IiwidCI6IjAyMDhhY2YzLTJiYjQtNGMzYi04MGQ5LTM2YTY4M2Y3OWZkNiJ9&pageName=9d45593874a64936a66d')">

    <i class="bi bi-calendar-check"></i>
    <h3>Liquidación Antigüedad</h3>
    <p>Seguimiento de antigüedad</p>

</div>

<div class="card-btn"
     onclick="cargarReporte('Bolsa Tienda','https://app.powerbi.com/view?r=eyJrIjoiNWE0OWJhMWMtNTU5Ny00YmU5LWI2N2QtOGNjYzg2YjMwZDEzIiwidCI6IjAyMDhhY2YzLTJiYjQtNGMzYi04MGQ5LTM2YTY4M2Y3OWZkNiJ9&pageName=eccb299d317937f2f476')">

    <i class="bi bi-bar-chart-fill"></i>
    <h3>Bolsa Tienda</h3>
    <p>Indicadores estratégicos</p>

</div>
```

</div>

<div class="report-card">

```
<div class="report-header" id="titulo">
    Selecciona un reporte
</div>

<div id="placeholder">

    <div class="placeholder-title">
        <span class="arrow">⬆️</span>
        Selecciona Tu Reporte
    </div>

    <div class="placeholder-text">
        Selecciona uno de los reportes para visualizar la información
    </div>

</div>

<iframe id="visor" allowfullscreen></iframe>
```

</div>

<script>

function cargarReporte(nombre,url){

    document.getElementById('titulo').innerText = nombre;

    document.getElementById('placeholder').style.display = 'none';

    const visor = document.getElementById('visor');

    visor.style.display = 'block';

    visor.src = url;

    document.querySelector('.report-card').scrollIntoView({
        behavior:'smooth',
        block:'start'
    });

}

</script>

</body>
</html>
